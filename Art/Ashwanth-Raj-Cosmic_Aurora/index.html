<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cosmic Aurora</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="scene">
      <div class="stars s1"></div>
      <div class="stars s2"></div>
      <div class="stars s3"></div>

      <div class="aurora a1"></div>
      <div class="aurora a2"></div>
      <div class="aurora a3"></div>
      <div class="aurora a4"></div>

      <div class="shoot sh1"></div>
      <div class="shoot sh2"></div>
      <div class="shoot sh3"></div>
      <div class="shoot sh4"></div>
      <div class="shoot sh5"></div>

      <div class="planet p1">
        <div class="ring"></div>
        <div class="crater c1"></div>
        <div class="crater c2"></div>
      </div>

      <div class="planet p2">
        <div class="crater c3"></div>
      </div>

      <div class="planet p3">
        <div class="ring r2"></div>
      </div>

      <div class="moon">
        <div class="moon-glow"></div>
        <div class="crater mc1"></div>
        <div class="crater mc2"></div>
        <div class="crater mc3"></div>
      </div>

      <div class="nebula n1"></div>
      <div class="nebula n2"></div>
      <div class="nebula n3"></div>

      <div class="particle pr1"></div>
      <div class="particle pr2"></div>
      <div class="particle pr3"></div>
      <div class="particle pr4"></div>
      <div class="particle pr5"></div>
      <div class="particle pr6"></div>
      <div class="particle pr7"></div>
      <div class="particle pr8"></div>
    </div>
  </body>
</html>
