<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cosmic Black Hole</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="space">
    <div class="blackhole">
      <!-- Vertical ring (lensed light above/below) -->
      <div class="vertical-ring"></div>
      <!-- Horizontal accretion disk -->
      <div class="disk"></div>
      <div class="disk disk--inner"></div>
      <!-- Dark core -->
      <div class="core"></div>
      <!-- Glow behind -->
      <div class="glow"></div>
      <!-- Particles spiraling in -->
      <div class="particle p1"></div>
      <div class="particle p2"></div>
      <div class="particle p3"></div>
      <div class="particle p4"></div>
      <div class="particle p5"></div>
      <div class="particle p6"></div>
    </div>
  </div>
</body>
</html>
