<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#05030d" />
  <meta name="description" content="Quantum Orbit — an original pure HTML and CSS dimensional flower animation." />
  <title>Quantum Orbit</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="scene" aria-label="Quantum Orbit: an abstract animated dimensional flower">
    <div class="scene-atmosphere" aria-hidden="true"></div>
    <div class="scene-vignette" aria-hidden="true"></div>
    <div class="stars" aria-hidden="true">
      <div class="stars-layer stars-layer--a"></div>
      <div class="stars-layer stars-layer--b"></div>
    </div>

    <section class="rift" aria-hidden="true">
      <div class="rift-glow"></div>

      <div class="halo halo--outer"></div>
      <div class="halo halo--middle"></div>
      <div class="halo halo--inner"></div>

      <div class="petal-ring petal-ring--back">
        <i style="--i:0"></i><i style="--i:1"></i><i style="--i:2"></i><i style="--i:3"></i>
        <i style="--i:4"></i><i style="--i:5"></i><i style="--i:6"></i><i style="--i:7"></i>
        <i style="--i:8"></i><i style="--i:9"></i><i style="--i:10"></i><i style="--i:11"></i>
      </div>

      <div class="petal-ring petal-ring--front">
        <i style="--i:0"></i><i style="--i:1"></i><i style="--i:2"></i><i style="--i:3"></i>
        <i style="--i:4"></i><i style="--i:5"></i><i style="--i:6"></i><i style="--i:7"></i>
      </div>

      <div class="orbit orbit--one"><b></b></div>
      <div class="orbit orbit--two"><b></b></div>
      <div class="orbit orbit--three"><b></b></div>

      <div class="core">
        <span class="core__shell"></span>
        <span class="core__spark"></span>
      </div>

      <div class="shockwave shockwave--one"></div>
      <div class="shockwave shockwave--two"></div>
    </section>

    <section class="title-card">
      <p>Milan-rawat-Quantum-Orbit</p>
      <h1>Quantum Orbit</h1>
      <p>An elegant dance of electrons around a radiant quantum core.</p>
    </section>
  </main>
</body>
</html>
